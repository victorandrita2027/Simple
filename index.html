<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 650px;
        margin: 40px auto;
        padding: 20px;
        background: #f7f7f7;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 { text-align:center; color:#00AD9F; }

    label {
        display:block;
        margin-top:15px;
        font-weight:bold;
    }

    input, select, textarea {
        width:100%;
        padding:10px;
        margin-top:6px;
        border-radius:6px;
        border:1px solid #ddd;
        box-sizing: border-box;
    }

    .block {
        margin-top:15px;
        padding:15px;
        background:#fafafa;
        border-radius:8px;
        border:1px solid #eee;
    }

    button {
        background:#00AD9F;
        color:white;
        border:none;
        padding:12px;
        width:100%;
        margin-top:20px;
        border-radius:6px;
        cursor:pointer;
        font-size: 16px;
        font-weight: bold;
    }

    #yes-section { display:none; margin-top:20px; }
    .hidden { display:none; }
    
    /* Thank you screen styles */
    #thankYouScreen {
        display: none;
        text-align: center;
        padding: 40px 20px;
    }
    #thankYouScreen h2 {
        color: #00AD9F;
        margin-bottom: 10px;
    }
    #thankYouScreen p {
        color: #555;
        font-size: 16px;
    }
    .success-icon {
        font-size: 50px;
        color: #00AD9F;
        margin-bottom: 15px;
    }
</style>
</head>

<body>

<div class="container">

    <div id="formWrapper">
        <h1>RSVP</h1>
        <form id="rsvpForm">

        <label>Name on invitation</label>
        <input type="text" name="respondent_name" required>

        <label>Will you be attending?</label>
        <select name="attendance" onchange="toggleAttendance(this.value)" required>
            <option value="">Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <div id="yes-section">
            <h3>Your Details</h3>
            <div class="block">
                <h4>Main Guest</h4>
                <label>Meal Preference</label>
                <select name="main_meal">
                    <option></option>
                    <option>Vegan</option>
                    <option>Vegetarian</option>
                    <option>Fish</option>
                    <option>Meat</option>
                </select>
                <label>Dietary Requirements</label>
                <textarea name="main_diet"></textarea>
            </div>

            <h3>Guests</h3>
            <div id="guest-container"></div>
            <button type="button" onclick="addGuest()">+ Add Guest</button>
        </div>

        <button type="submit" id="submitBtn">Submit RSVP</button>
        </form>
    </div>

    <div id="thankYouScreen">
        <div class="success-icon">✓</div>
        <h2>Submission Complete!</h2>
        <p>Thank you for letting us know. Your details have been successfully saved.</p>
    </div>

</div>

<div class="hidden">
    <div id="g1" class="block">
        <h4>Guest 1</h4>
        <label>Name</label>
        <input name="guest_1_name">
        <label>Meal Preference</label>
        <select name="guest_1_meal">
            <option></option>
            <option>Vegan</option>
            <option>Vegetarian</option>
            <option>Fish</option>
            <option>Meat</option>
        </select>
        <label>Dietary Requirements</label>
        <textarea name="guest_1_diet"></textarea>
    </div>

    <div id="g2" class="block">
        <h4>Guest 2</h4>
        <label>Name</label>
        <input name="guest_2_name">
        <label>Meal Preference</label>
        <select name="guest_2_meal">
            <option></option>
            <option>Vegan</option>
            <option>Vegetarian</option>
            <option>Fish</option>
            <option>Meat</option>
        </select>
        <label>Dietary Requirements</label>
        <textarea name="guest_2_diet"></textarea>
    </div>

    <div id="g3" class="block">
        <h4>Guest 3</h4>
        <label>Name</label>
        <input name="guest_3_name">
        <label>Meal Preference</label>
        <select name="guest_3_meal">
            <option></option>
            <option>Vegan</option>
            <option>Vegetarian</option>
            <option>Fish</option>
            <option>Meat</option>
        </select>
        <label>Dietary Requirements</label>
        <textarea name="guest_3_diet"></textarea>
    </div>
</div>

<script>
let guestIndex = 0;
const maxGuests = 3;

function toggleAttendance(value) {
    document.getElementById('yes-section').style.display =
        value === "Yes" ? "block" : "none";
}

function addGuest() {
    if (guestIndex >= maxGuests) return;
    guestIndex++;

    const template = document.getElementById('g' + guestIndex);
    const clone = template.cloneNode(true);

    const container = document.getElementById('guest-container');
    container.appendChild(clone);

    if (guestIndex === maxGuests) {
        document.querySelector('button[onclick="addGuest()"]').style.display = 'none';
    }
}

// FRONTEND SUBMIT HANDLER
document.getElementById('rsvpForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // 1. Google Script Target URL
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbw_FpxfH61mNEDnIHTmUJT8nDybQ0Yrpk1jghADAawqOX36qa1I9EnrKDk-WN0J7799DA/exec';
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerText = 'Sending RSVP...';

    // 2. Capture all fields dynamically
    const formData = new FormData(this);
    const payload = {};
    formData.forEach((value, key) => {
        payload[key] = value;
    });

    // 3. Post to Google Sheets Backend (Bypassing preflight check constraints)
    fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors', 
        headers: {
            'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
    })
    .then(() => {
        // Hide the form entirely and reveal the custom "Submission Complete" view!
        document.getElementById('formWrapper').style.display = 'none';
        document.getElementById('thankYouScreen').style.display = 'block';
    })
    .catch(error => {
        console.error('Error sending form data:', error);
        alert('Oops! There was a connection problem. Please try clicking submit again.');
        submitBtn.disabled = false;
        submitBtn.innerText = 'Submit RSVP';
    });
});
</script>

</body>
</html>
